<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head(${modoEdicion ? 'Editar Producto' : 'Agregar Producto'})}"></head>

<body th:replace="~{layout/base :: layout(~{::titulo}, ~{::contenido}, ~{::scripts})}">

  <!-- Titulo de la navbar -->
  <th:block th:fragment="titulo">
    <i class="bx bx-edit me-1" th:if="${modoEdicion}"></i>
    <i class="bx bx-plus-circle me-1" th:unless="${modoEdicion}"></i>
    <span th:text="${modoEdicion ? 'Editar Producto' : 'Agregar Producto'}">Producto</span>
  </th:block>

  <!-- ===================== CONTENIDO ===================== -->
  <div th:fragment="contenido">

    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a th:href="@{/productos}">Productos</a>
            </li>
            <li class="breadcrumb-item active"
                th:text="${modoEdicion ? 'Editar' : 'Agregar'}">Formulario</li>
          </ol>
        </nav>

        <div class="card">
          <div class="card-header py-3">
            <h5 class="mb-0">
              <i class="bx text-primary me-2"
                 th:classappend="${modoEdicion ? 'bx-edit' : 'bx-plus-circle'}"></i>
              <span th:text="${modoEdicion ? 'Editar Producto' : 'Agregar Producto'}">Producto</span>
            </h5>
          </div>

          <div class="card-body">

            <!--
              th:object: vincula el formulario con el objeto Producto del modelo.
              th:action: cambia la URL segun si es alta o edicion.
              method="POST": los formularios Spring MVC usan POST.
            -->
            <form th:action="${modoEdicion ? '/productos/actualizar' : '/productos/guardar'}"
                  th:object="${producto}"
                  method="POST"
                  novalidate>

              <!-- ID oculto: necesario para que Hibernate sepa que es un UPDATE -->
              <input type="hidden" th:field="*{id}" />

              <!-- ===== Nombre ===== -->
              <div class="mb-3">
                <label for="nombre" class="form-label fw-semibold">
                  Nombre <span class="text-danger">*</span>
                </label>
                <input type="text"
                       id="nombre"
                       th:field="*{nombre}"
                       th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid' : ''"
                       class="form-control"
                       placeholder="Ingrese el nombre del producto"
                       maxlength="150" />
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('nombre')}"
                     th:errors="*{nombre}"></div>
              </div>

              <!-- ===== Descripcion ===== -->
              <div class="mb-3">
                <label for="descripcion" class="form-label fw-semibold">
                  Descripción <span class="text-danger">*</span>
                </label>
                <textarea id="descripcion"
                          th:field="*{descripcion}"
                          th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"
                          class="form-control"
                          rows="3"
                          placeholder="Ingrese la descripción del producto"></textarea>
                <div class="invalid-feedback"
                     th:if="${#fields.hasErrors('descripcion')}"
                     th:errors="*{descripcion}"></div>
              </div>

              <!-- ===== Categoria + Precio (en la misma fila) ===== -->
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="categoria" class="form-label fw-semibold">
                    Categoría <span class="text-danger">*</span>
                  </label>
                  <select id="categoria"
                          th:field="*{categoria}"
                          th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid' : ''"
                          class="form-select">
                    <option value="">Seleccione una categoría</option>
                    <option value="Computadoras">Computadoras</option>
                    <option value="Monitores">Monitores</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Impresoras">Impresoras</option>
                    <option value="Almacenamiento">Almacenamiento</option>
                    <option value="Redes">Redes</option>
                    <option value="Audio y Video">Audio y Video</option>
                  </select>
                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('categoria')}"
                       th:errors="*{categoria}"></div>
                </div>
                <div class="col-md-6">
                  <label for="precio" class="form-label fw-semibold">
                    Precio <span class="text-danger">*</span>
                  </label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number"
                           id="precio"
                           th:field="*{precio}"
                           th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid' : ''"
                           class="form-control"
                           placeholder="0.00"
                           min="0"
                           step="0.01" />
                    <div class="invalid-feedback"
                         th:if="${#fields.hasErrors('precio')}"
                         th:errors="*{precio}"></div>
                  </div>
                </div>
              </div>

              <!-- ===== Existencia + Fecha de Registro (en la misma fila) ===== -->
              <div class="row mb-4">
                <div class="col-md-6">
                  <label for="existencia" class="form-label fw-semibold">
                    Existencia <span class="text-danger">*</span>
                  </label>
                  <input type="number"
                         id="existencia"
                         th:field="*{existencia}"
                         th:classappend="${#fields.hasErrors('existencia')} ? 'is-invalid' : ''"
                         class="form-control"
                         placeholder="0"
                         min="0" />
                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('existencia')}"
                       th:errors="*{existencia}"></div>
                </div>
                <div class="col-md-6">
                  <label for="fechaRegistro" class="form-label fw-semibold">
                    Fecha de Registro <span class="text-danger">*</span>
                  </label>
                  <input type="date"
                         id="fechaRegistro"
                         th:field="*{fechaRegistro}"
                         th:classappend="${#fields.hasErrors('fechaRegistro')} ? 'is-invalid' : ''"
                         class="form-control" />
                  <div class="invalid-feedback"
                       th:if="${#fields.hasErrors('fechaRegistro')}"
                       th:errors="*{fechaRegistro}"></div>
                </div>
              </div>

              <!-- ===== Botones ===== -->
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                  <i class="bx bx-save me-1"></i>
                  <span th:text="${modoEdicion ? 'Actualizar' : 'Guardar'}">Guardar</span>
                </button>
                <a th:href="@{/productos}" class="btn btn-secondary">
                  <i class="bx bx-arrow-back me-1"></i> Cancelar
                </a>
              </div>

            </form>

          </div><!-- /card-body -->
        </div><!-- /card -->

      </div>
    </div>

  </div><!-- /contenido -->

  <!-- Sin scripts adicionales en este formulario -->
  <th:block th:fragment="scripts"></th:block>

</body>
</html>
