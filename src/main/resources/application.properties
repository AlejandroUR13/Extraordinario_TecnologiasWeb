spring.application.name=extraordinario

# =====================================================================
# BASE DE DATOS - H2 EN MEMORIA (modo sin MySQL)
# Los datos se pierden al detener la app. Cuando recuperes MySQL:
#   1. Comenta todo el bloque H2
#   2. Descomenta el bloque MySQL de abajo
# =====================================================================
spring.datasource.url=jdbc:h2:mem:db_productos;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web de H2 (util para ver las tablas mientras desarrollas)
# Accede en: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:db_productos)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =====================================================================
# BASE DE DATOS - MySQL (comentado temporalmente)
# =====================================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/db_productos?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=TU_PASSWORD

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================== Thymeleaf =====================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===================== Sesion HTTP =====================
server.servlet.session.timeout=30m

server.port=${PORT:8080}
